name: build
on:
  push:
    branches: [main]
env:
  REGISTRY_SERVER: ${{vars.REGISTRY_SERVER}}
  APP_NAME: uw-task-center
  APP_PORT: 10010

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: build
        run: |
          git clone -q ${{gitea.server_url}}/${{ gitea.repository }}.git .
          mvn clean package -U -Dmaven.test.skip=true
          APP_VERSION=`grep '<version>' pom.xml |awk -F'>' '{print $2}'|awk -F"<" '{print $1}'|head -n 1`
          grep -q qemu-aarch64 /proc/sys/fs/binfmt_misc/status 2>/dev/null || docker run --rm --privileged multiarch/qemu-user-static --reset -p yes
          docker buildx use multiarch 2>/dev/null || docker buildx create --use --name multiarch --driver docker-container --driver-opt network=host --config /etc/docker/buildkitd.toml --platform linux/amd64,linux/arm64
          docker buildx build --platform linux/amd64,linux/arm64 --build-arg APP_NAME=${APP_NAME} -t ${REGISTRY_SERVER}/${APP_NAME}:${APP_VERSION} --push .
          /home/gitea/runner/deploy/deploy-registry-app.sh ${APP_NAME} ${APP_VERSION} ${APP_PORT}
